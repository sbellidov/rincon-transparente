name: Actualizar datos de contratos

on:
  schedule:
    - cron: '0 3 * * 6'   # Todos los sábados a las 03:00 UTC (4h/5h España)
  workflow_dispatch:        # Permite lanzarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline ETL
        env:
          APIEMPRESAS_KEY: ${{ secrets.APIEMPRESAS_KEY }}
        run: |
          python scripts/discover_data.py
          python scripts/download_data.py
          python scripts/process_data.py
          python scripts/enrich_data.py
          python scripts/analyze_data.py
          python scripts/audit_data.py

      - name: Publicar JSONs a docs/data/ (autónomos enmascarados)
        run: python scripts/publish_data.py

      - name: Commit y push si hay datos nuevos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ data/catalog.json data/enriched/companies_cache.json
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos. Nada que commitear."
          else
            git commit -m "chore(data): actualizar contratos $(date +'%Y-%m-%d')"
            git push
          fi
