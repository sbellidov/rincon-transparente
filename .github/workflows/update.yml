name: Actualizar datos de contratos

on:
  schedule:
    - cron: '0 3 * * 6'   # Todos los sábados a las 03:00 UTC (4h/5h España)
  workflow_dispatch:        # Permite lanzarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline ETL
        run: |
          python scripts/download_data.py
          python scripts/process_data.py
          python scripts/analyze_data.py
          python scripts/audit_data.py

      - name: Sincronizar JSONs a docs/data/
        run: cp data/processed/*.json docs/data/

      - name: Commit y push si hay datos nuevos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos. Nada que commitear."
          else
            git commit -m "chore(data): actualizar contratos $(date +'%Y-%m-%d')"
            git push
          fi
